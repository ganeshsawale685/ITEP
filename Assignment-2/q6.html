<!-- 6️⃣ Grade Calculation

Write a program using the conditional operator to assign grades based on marks:

≥ 90 → A

≥ 75 → B

≥ 60 → C

< 60 → Fail
 -->

<script>
    var marks = prompt("Enter Marks");
    (marks >= 90) ? document.write(" Grade : A") : (marks >=75) ? document.write("Grade : B") : (marks >=60 ) ? document.write("Grade : C") : document.write("Fail");
</script>

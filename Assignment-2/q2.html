<!-- 2️⃣ Positive, Negative or Zero

Write a JavaScript program using nested conditional operators to determine whether a number is positive, negative, or zero. -->

<script>
    var num = prompt("Enter a number")*1;
    (num > 0 )? document.write("Positive") : (num < 0) ? document.write("Negative") : document.write("Zero");
</script>

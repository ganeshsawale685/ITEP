<!-- 1️⃣ Even or Odd Check

Write a JavaScript program using the conditional operator to check whether a given number is even or odd.
The program should store the result in a variable and display it using console.log(). -->
<script>
    var num = prompt("Enter first number")*1;

    //conditional statement with modulator
    (num%2 === 0) ? console.log("The Number is Even") : console.log("Number is Odd");

    


</script>

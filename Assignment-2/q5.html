5️⃣ Maximum of Three Numbers

Write a JavaScript program using nested ternary operators to find the maximum of three numbers.  -->

<script>
    var first = prompt("Enter First Number");
    var second = prompt("Enter Second  Number");
    var third = prompt("Enter Third Number");

    (first > second && first > third) ? document.write("First Number is Greater : "+first) : (second > third) ? document.write("Second Number is Greater :"+second) : document.write("Third Number is Greater : "+third);
    
</script>

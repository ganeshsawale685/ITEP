<!-- 9️⃣ Largest Value Using Expressions

Write a JavaScript program using the conditional operator to compare two arithmetic expressions and display the greater result.
 -->

<script>
    var num1 = prompt("Enter first num");
    var num2 = prompt("Enter second num");

    var exp1 = num1*10*5
    var exp2 = num2*8*6;

    (exp1 > exp2) ? document.write("Expression 1st is Largest = "+exp1) : document.write("Expression 2nd is Largest = "+exp2);

</script>

<!-- 4️⃣ Maximum of Two Numbers

Write a JavaScript program using the conditional operator to find the largest of two numbers entered by the user.
 -->

<script>
    var firstNum = prompt("Enter First Number ")*1;
    var secondNum = prompt("Enter Second Number")*1;

    (firstNum > secondNum) ? document.write("First Number Greater : "+firstNum) : document.write("Second Number Greater : "+secondNum);

</script>

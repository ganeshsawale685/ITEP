<!-- 9) WAP to print N even numbers. -->

<script>
    let n = prompt("Enter a number")*1;
    let i = 2;
    while(n!=0){
        if(i % 2 == 0){
            document.write(i+"<br>");
           i++;
        }
        i++;
        n--;
    }

    document.write("By For loop<br>");

for(let i=1;i<=n;i++){
    document.write(i*2+" ");
}
</script>

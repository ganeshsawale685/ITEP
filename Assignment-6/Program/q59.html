<!-- 59) WAP to find out the sum of all integer between 100 and 200 which are divisible by 9 -->

<script>
    let i =100;

    while(i<=200){
        if(i%9 === 0){
            document.write(i+" is divisible by 9<br>")
        }
        i++;
    }


    document.write("By For loop<br>");
let sum=0;

for(let i=100;i<=200;i++){
    if(i%9==0) sum+=i;
}
document.write("Sum = "+sum);
    
</script>

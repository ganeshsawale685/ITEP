<!-- 7) WAP to check whether entered number is prime or not. -->

<script>
    let n = prompt("Enter a number") * 1;

    let i = 2;
    let prime = true;
    while (i < n) {
        if (n % i == 0) {
            prime = false;
            break;
        }
        i++;
    }
    if (prime) {
        document.write("Number is Prime");
    }else{
         document.write("Number is Not Prime");
    }

    document.write("By For loop<br>");
let c=0;
for(let i=1;i<=n;i++){
    if(n%i==0) c++;
}
document.write(c==2?"Prime":"Not Prime");



</script>

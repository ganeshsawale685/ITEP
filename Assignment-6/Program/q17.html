<!-- 17) 1 	2	 4	 7	 11	 16 	…… n terms -->

<script>
    let n = prompt("Enter a number")*1;
    let i = 1;
    let result = 1;
    while(i<=n){
        document.write(result+"<br>");
        result+=i;
        i++;
    }

    document.write("By For loop<br>");
let x=1;
for(let i=1;i<=n;i++){
    document.write(x+" ");
    x+=i;
}
</script>

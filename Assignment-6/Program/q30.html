<!-- 30) 1+11+111+1111+11111.  -->

<script>
    let n = prompt("Enter number")*1;
    let i = 1;
   
    while(i<=n){
         let j = 1;
        while(j<=i){
             document.write(1);
             j++;
        }
         document.write("+");
        i++;

    }

    document.write("By For loop<br>");
let s="", sum=0;
for(let i=1;i<=n;i++){
    s+="1";
    sum+=Number(s);
}
document.write("Sum = "+sum);
</script>

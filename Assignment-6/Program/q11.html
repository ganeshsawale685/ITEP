<!-- 11) WAP to print N odd numbers. -->

<script>
    let n = prompt("Enter a number")*1;
    let i = 1;
    while(n!=0){
        if(i % 2 !== 0){
            document.write(i+"<br>");
           i++;
        }
        i++;
        n--;
    }

    document.write("By For loop<br>");

for(let i=1;i<=n;i++){
    document.write((2*i-1)+" ");
}
</script>

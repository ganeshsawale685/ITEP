<!-- 28) 1	2	3	4	 Hello	6	7	8	9	Hello	11	12 …. -->

<script>
    let num = prompt("Enter a number")*1;
    let i = 1;
    while(num !=0){
        if(i % 5 == 0){
             document.write("Hello"+"-");
             i++;
        }
        else{
            document.write(i+"-");
            i++;
        }
        num--;
    }


    document.write("By For loop<br>");
for(let i=1;i<=20;i++){
    document.write(i%5==0?"Hello ":i+" ");
}
</script>

<!-- 4) WAP to print table of a number. -->

<script>
    let n = prompt("Enter a number")*1;
    let i =1;
    while(i!=11){
        document.write(n+"*"+i+"="+n*i +"<br>");
        i++;
    }

    document.write("By For loop<br>");

for(let i=1;i<=10;i++){
    document.write(n+" x "+i+" = "+(n*i)+"<br>");
}
</script>

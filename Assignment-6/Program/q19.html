<!-- 19) 1	+	1/2	+	1/3	+	1/4	+	1/5	….. n terms(find out sum) -->

<script>
    let n = prompt("Enter a number")*1;
    let i =1;
    let res = 1;
    let ans = 1;
    while(i<=n){
        res = 1 / i;
        document.write("1/"+i +"+");
        ans = ans + res;
        i++;

    }

    document.write("<br>Sum :"+ans);


    document.write("By For loop<br>");
let sum=0;
for(let i=1;i<=n;i++){
    sum+=1/i;
}
document.write("Sum = "+sum);
</script>

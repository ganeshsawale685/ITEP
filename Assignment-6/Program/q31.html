<!-- 31) 9	99	999	9999	  99999 ……. -->

<script>
    let n = prompt("Enter number")*1;
    let i = 1;
   
    while(i<=n){
         let j = 1;
        while(j<=i){
             document.write(9);
             j++;
        }
         document.write(" ");
        i++;

    }

    document.write("By For loop<br>");
let s="";
for(let i=1;i<=n;i++){
    s+="9";
    document.write(s+" ");
}

</script>

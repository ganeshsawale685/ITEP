<!-- 42) WAP to find out HCF of a number -->
 <script>
    let n = prompt("Enter number")*1;
    let i = 2;
    let val = 0;
    while(i<=n){
        if(n%i==0){
            d = i + "";
            n = n/i;
            document.write(d+" ")
        }else{
            i++;
        }
    }
    if(d){
        document.write("<br>Heighest :"+d)
    }
</script>

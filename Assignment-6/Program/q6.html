<!-- 6) WAP to find out the factors of a number. -->

<script>
    let num = prompt("Enter a number")*1;
    let i = 1;
    document.write("Factor of "+num +":")
    while(i<=num){
        if(num%i == 0){
            document.write("<br>"+i);
        }
        i++;
    }

    document.write("By For loop<br>");
let n=prompt("Enter number");
for(let i=1;i<=n;i++){
    if(n%i==0) document.write(i+" ");
}

</script>

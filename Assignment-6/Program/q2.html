<!-- 2) WAP to print N natural number -->

<script>
    let n = prompt("Enter a number") * 1;
    let i = 1;
    while (i <= n) {
        document.write("<br>" + i);
        i++;
    }

    document.write("By For loop<br>");

    for (let i = 1; i <= n; i++) {
        document.write(i + " ");
    }

</script>

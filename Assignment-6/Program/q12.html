<!-- 12) WAP to print Odd numbers upto N. -->

<script>
      let n = prompt("Enter a number")*1;
    let i = 1;
    while(n!=0){
        if(i % 2 !== 0){
            document.write(i+"<br>");
           
        }
        i++;
        n--;
    }

    document.write("By For loop<br>");

for(let i=1;i<=n;i+=2){
    document.write(i+" ");
}
</script>

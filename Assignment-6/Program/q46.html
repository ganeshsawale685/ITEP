<!-- 46) WAP to find out the sum of first and last digit of a user entered number  -->

<script>
    let num = prompt("Enter a number")*1;
    let lastDigit = num%10;
    let firstDigit =0;
    while(num>0){
        let r = num%10;
        firstDigit = r;
        num = parseInt(num/10);

    }

    document.write("Sum of first and last digit "+(firstDigit+lastDigit));

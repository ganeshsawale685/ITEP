<!-- 47) WAP to print tables of all the numbers between two entered numbers -->

<script>
    let a = prompt("Enter first number")*1;
    let b = prompt("Enter second number")*1;

  
    while( a<=b ){
        let i =1;
        while(i<=10){
            document.write(a+"*"+i+"="+a*i +"<br>");
        i++;
        }
        document.write("<br>-------------------------------- <br>")
        a++;
    }
    document.write("By For loop<br>");

for(let i=a;i<=b;i++){
    document.write("<br>Table of "+i+"<br>");
    for(let j=1;j<=10;j++){
        document.write(i+" x "+j+" = "+(i*j)+"<br>");
    }
}
</script>

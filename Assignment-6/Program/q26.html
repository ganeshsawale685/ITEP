<script>
    let n = prompt("Enter a number")*1;
    let i = 2;

    document.write(0+"<br>");
    while((n-1)!=0){
        if(i % 2 == 0){
            document.write(i*i*i+"<br>");
           i++;
        }
        i++;
        n--;
    }

    document.write("By For loop<br>");
for(let i=0;i<=4;i++){
    document.write(i*i*i+" ");
}
</script>

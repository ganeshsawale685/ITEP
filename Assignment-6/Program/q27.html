<!-- 27) *	#	*	#	*	#	*	#	*	……. -->

<pre>
    <script>
    let n = prompt("Enter a number")*1;
    let i = 1;

    while((n)!=0){
        if(i % 2 == 0){
            document.write(" #");
           
        }
        else{
            document.write("*");
        }
        i++;
        n--;
    }

    document.write("By For loop<br>");
for(let i=1;i<=10;i++){
    document.write(i%2==0?"# ":"* ");
}
</script>
</pre>

<!-- 23) 1	9	25	49	81	….. -->
<script>
    let n = prompt("Enter a number")*1;
    let i = 1;
    while(n!=0){
        if(i % 2 !== 0){
            document.write(i*i+"<br>");
           
        }
        i++;
        n--;
    }

    document.write("By For loop<br>");
for(let i=1;i<=9;i+=2){
    document.write(i*i+" ");
}
</script>

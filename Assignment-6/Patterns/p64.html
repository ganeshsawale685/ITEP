<!-- 
    X 
   X X 
  X__ X
 X____ X
X X X X X
 
-->

<pre>
<script>
for(let i =1;i<=5 ;i++){
for(let sp = 5 ; sp>i-1 ;sp--){
    document.write(" ")
}

for(let j = 1;j<=i;j++){
   if(j == 1 || j ==i || i==5){
    document.write("X ")
   }else{
    document.write("  ")
   }
}
document.write("<br>")
}
</script>
</pre>

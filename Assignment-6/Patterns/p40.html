<pre>
<script>
    for (let i = 5; i >= 1; i--) {
        for (let j = 1; j <= i; j++) {
            if (i == 5 || j == 1 || j == i) {
                document.write("*");
            } else {
                document.write(" ");
            }
        }
        document.write("<br>");
    }
</script>
</pre>

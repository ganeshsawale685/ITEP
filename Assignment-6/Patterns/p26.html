<pre>
<script>
    for (let i = 1; i <= 5; i++) {
        for (let j = 1; j <= 5; j++) {
            if (j == 1 || i == j || i == 5) {
                document.write(i);
            } else {
                document.write(" ");
            }
        }
        document.write("<br>")      
    }
</script>

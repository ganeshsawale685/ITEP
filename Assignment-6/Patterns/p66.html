<pre>
<script>
for(let i =1;i<=5 ;i++){
for(let sp = 5 ; sp>i-1 ;sp--){
    document.write(" ")
}
let ch = 'A'
for(let j = 0;j<2*i-1;j++){
    let code = ch.charCodeAt()+j
     document.write(String.fromCharCode(code))

}
ch = 'A'
document.write("<br>")
}
</script>
</pre>

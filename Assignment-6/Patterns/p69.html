<!-- 
    1
   1 1
  1 2 1
 1 3 3 1
1 4 6 4 1
 
-->

<pre>
<script>
let n = 5;

for (let i = 0; i < n; i++) {
    let num = 1;
    
    // Print spaces
    for (let space = 1; space <= n - i; space++) {
        document.write(" ");
    }

    // Print numbers
    for (let j = 0; j <= i; j++) {
        document.write(num + " ");
        num = num * (i - j) / (j + 1);
    }

    document.write("<br>");
}
</script>
</pre>

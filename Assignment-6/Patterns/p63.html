   A B
  A B C
 A B C D
A B C D E

<pre>
<script>
for(let i =1;i<=5 ;i++){
for(let sp = 5 ; sp>i-1 ;sp--){
    document.write(" ")
}
let ch = 'A'
for(let j = 0;j<i;j++){
    let code = ch.charCodeAt()+j
     document.write(String.fromCharCode(code) +" ")

}
ch = 'A'
document.write("<br>")
}
</script>

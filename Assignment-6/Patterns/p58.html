<pre>
<script>
    let a =1
    for(let i = 5;i>=1;i--){
        for(let j = 1;j<=a;j++){
            document.write(" ");
        }
        for(let j = 1;j<=i;j++){
            if (i == 5 || j == 1 || j == i) {
                document.write(i);
            } else {
                document.write(" ");
            }
        }
        document.write("<br>")
        a++
    }
</script>
</pre>

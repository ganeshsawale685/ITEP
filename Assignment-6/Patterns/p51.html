<pre>
<script>
    for(let i =1;i<=5;i++){
        for(let j=4;j>=i;j--){
            document.write(" ")
        }
        for(let j = 1;j<=i;j++){
            if (j == 1 || i == j || i == 5) {
                  document.write(1)
                
            } else {
                document.write(" ");
            }
        }
        document.write('<br>')

    }
</script>

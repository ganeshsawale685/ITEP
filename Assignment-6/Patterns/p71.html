<pre>
<script>
for(let i =1;i<=5 ;i++){
for(let sp = 5 ; sp>i-1 ;sp--){
    document.write(" ")
}

for(let j = 1;j<=2*i-2;j++){
    if(j == i){
        document.write("#")
    }
     document.write("*")
}
document.write("<br>")
}
</script>
</pre>

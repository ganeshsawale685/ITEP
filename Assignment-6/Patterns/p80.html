<pre>
<script>
    a =3
for(let i = 1;i<=4;i++){
    for(let j = 4 ;j>i;j--){
        document.write(" ")
    }
    for(let j=1;j<=i;j++){
        document.write(j)
    }
    document.write("<br>")
}

for(let i = 1;i<=3;i++){
    for(let j = 1;j<=i;j++){
        document.write(" ");
    }
    for(let j = 1 ;j<=a;j++){
        document.write(j)
    }
    document.write('<br>')
    a--;
}


</script>
</pre>

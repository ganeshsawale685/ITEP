<!-- 
1
1 2
1  3
1   4
1  3
1 2
1


-->

<pre>
<script>
    for(let i =1;i<=4 ;i++){
        for(let j = 1;j<=i;j++){
            if(i==j || j==1){
                document.write(j)
            }else{
                document.write(" ")
            }
        }
        document.write("<br>")
    }

    for(let i =3;i>=1 ;i--){
        for(let j = 1;j<=i;j++){
            if(i==j || j==1){
                document.write(j)
            }else{
                document.write(" ")
            }
        }
        document.write("<br>")
    }
</script>
</pre>

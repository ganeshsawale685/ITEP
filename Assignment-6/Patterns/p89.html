<pre>
<script>
    for(let i = 1;i<= 5;i++){
        for(let j = 1;j<=5 ;j++){
            if(j == 5){
                document.write(i)

            }else{
                document.write(" ")
            }
        }

        document.write("<br>")
    }
    document.write("123454321<br>")

     for(let i = 4;i>=1;i--){
        for(let j = 1;j<=5 ;j++){
            if(j == 5){
                document.write(i)

            }else{
                document.write(" ")
            }
        }

        document.write("<br>")
    }
</script>

    1
   10
  101
 1010
10101
 
-->

<pre>
<script>
    for(let i =1;i<=5;i++){
         for(let j=5;j>=i;j--){
            document.write(" ")
        }
        for(let j =1;j<=i;j++){
            if(j%2 !==0 ){
                document.write(1)
            }else{
                document.write(0);
            }
        }
        document.write("<br>")
    }
</script>
</pre>

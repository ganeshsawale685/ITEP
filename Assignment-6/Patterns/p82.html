<pre>
<script>
for(let i =1;i<=5 ;i++){
for(let sp = 5 ; sp>i-1 ;sp--){
    document.write(" ")
}

for(let j = 2;j<=2*i-1;j++){
    if(i>1 && j%2 !== 0){
        document.write(" ")
    }else document.write("*")
}
document.write("<br>")
}

for(let i =1;i<=3;i++){
    for(let j = 0;j<=i;j++){
        document.write(" ")
    }
    for(let j = 3;j>=i;j--){
        document.write("* ")
    }
    document.write("<br>")
}
</script>
</pre>

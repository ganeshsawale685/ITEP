<pre>
<script>
    
    for(let i =65;i<=69;i++){
        for(let j=68;j>=i;j--){
            document.write(" ")
        }
        for(let j = 65;j<=i;j++){
            document.write(String.fromCharCode(j))
        }
        document.write('<br>')

    }
</script>
</pre>

<!-- 
ABCDE
 A__D
  A_C
   AB
    A
 
-->

<pre>
<script>
    let a =1
 
    for(let i = 69;i>=65;i--){
        for(let j = 1;j<=a;j++){
            document.write(" ");
        }
        for(let j = 65;j<=i;j++){
            if (i == 69 || j == 65 || j == i) {
               document.write(String.fromCharCode(j))
            } else {
                document.write(" ");
            }
        }
        document.write("<br>")
        a++
    }
</script>
</pre>

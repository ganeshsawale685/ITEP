<!-- 27. Write a Java program to input basic salary of an employee and calculate its Gross salary according to following: Basic Salary <= 10000 : HRA = 20%, DA = 80% 
Basic Salary <= 20000 : HRA = 25%, DA = 90% 
Basic Salary > 20000 : HRA = 30%, DA = 95%  -->

<script>
    var basicSalary = prompt("Enter the Basic Salary") * 1;
    var hra, da, gs;

    if (basicSalary <= 10000) {
        hra =  ( basicSalary *20)/100;
        da =( basicSalary*80)/10;
    } 
    else if (basicSalary <= 20000) {
        hra = (basicSalary*25)/100;
        da = (basicSalary*90)/100;
    } 
    else { // basicSalary > 20000
        hra = ( basicSalary * 30)/100;
        da = (basicSalary * 95)/100;
    }

    gs = basicSalary + hra + da;

    document.write("Basic Salary = Rs " + basicSalary + "<br>");
    document.write("HRA = Rs " + hra + "<br>");
    document.write("DA = Rs " + da + "<br>");
    document.write("Gross Salary = Rs " + gs);
</script>

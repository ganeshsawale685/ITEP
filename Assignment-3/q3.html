<!-- 3.A company decided to give bonus of 5% to employee if his/her year of service is more than 5 years.
Ask user for their salary and year of service and print the net bonus amount. -->

<script>
    var salary = prompt("Enter your salary ")*1;
    var year  = prompt ("Enter year of service")*1;

    if(year > 5){
        salary = salary+ (salary*5)/100;
        document.write("Salary is increased by 5% = "+salary);
    }else{
        document.write("Salary = "+salary);
    }
</script>

<!-- . Write a javascript program to input electricity unit charges and calculate total electricity bill according to the given condition: For first 50 units Rs. 0.50/unit For next 100 units Rs. 0.75/unit For next 100 units Rs. 1.20/unit For unit above 250 Rs. 1.50/unit An additional surcharge of 20% is added to the bill.  -->

<script>
    var units = prompt("Enter total electricity units consumed") * 1;
    var bill = 0;
    var surcharge;

    if (units <= 50) {
        bill = units * 0.50;
    } 
    else if (units <= 150) { // 51 to 150 units
        bill = 50 * 0.50 + (units - 50) * 0.75;
    } 
    else if (units <= 250) { // 151 to 250 units
        bill = 50 * 0.50 + 100 * 0.75 + (units - 150) * 1.20;
    } 
    else { // above 250 units
        bill = 50 * 0.50 + 100 * 0.75 + 100 * 1.20 + (units - 250) * 1.50;
    }

    // Add 20% surcharge
    surcharge = 0.20 * bill;
    bill = bill + surcharge;

    document.write("Total electricity bill (including 20% surcharge) = Rs " + bill.toFixed(2));
</script>

<!-- 1. Take values of length and breadth of a rectangle from user and check if it is square or not. -->

<script>
    var length = prompt("Enter the value of length")*1;
    var breadth = prompt("Enter the value of breadth")*1;

    if(length == breadth)
        document.write("It is Square");
    
    else 
        document.write("Not Square");
</script>

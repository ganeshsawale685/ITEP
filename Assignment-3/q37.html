<!-- Write a Java program to check whether a number is divisible by 5 and 11 or not.  -->

<script>
    var num = prompt("Enter a number") * 1;

    if (num % 5 === 0 && num % 11 === 0) {
        document.write(num + " is divisible by both 5 and 11");
    } else {
        document.write(num + " is not divisible by both 5 and 11");
    }
</script>

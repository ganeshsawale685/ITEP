<!--  W.A.P to check whether given number is even or odd Without using % operator.  -->

<script>
    var num = prompt("Enter a number") * 1;

    // Using division to check remainder
    var result = num / 2;
    if (result === Math.floor(result)) {
        document.write(num + " is an Even number");
    } else {
        document.write(num + " is an Odd number");
    }
</script>

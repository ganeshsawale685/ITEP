<!-- 7. WAP to find greater among three number -->

<script>
    var a = prompt("Enter first number") * 1;
    var b = prompt("Enter second number") * 1;
    var c = prompt("Enter third number") * 1;

    if (a > b && a > c) {
        document.write(a + " is the greatest number");
    }
    else if (b > a && b > c) {
        document.write(b + " is the greatest number");
    }
    else if (c > a && c > b) {
        document.write(c + " is the greatest number");
    }
    else {
        document.write("Two or more numbers are equal");
    }
</script>

<!-- 9. Write a program to check whether a entered character is lowercase ( a to z ) or uppercase ( A to Z ). -->

<script>
    var character = prompt("Enter a character");
    if(character >= 'a' && character <='z'){
        document.write("LowerCase Character");
    }else if(character >= 'A' && character <='Z'){
        document.write("UpperCase Character")
    }else{
        document.write("Not a alphabet character")
    }
</script>

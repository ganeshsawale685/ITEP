<!-- 7. A student will not be allowed to sit in exam if his/her attendence is less than 75%.
Take following input from user
Number of classes held
Number of classes attended.
And print
percentage of class attended
Is student is allowed to sit in exam or not. -->


<script>
    var classHeld = prompt("Enter number of classes held")*1;
    var classAttend = prompt("Enter number of classes attended")*1;

    document.write("<br>Number of classes held "+classHeld);
    document.write("<br>Number of classes attended "+classAttend);

    var eligiblity = (classAttend/classHeld)*100;

    console.log(eligiblity);

    if(eligiblity > 75){
        document.write("<br>You are eligible for exam "+eligiblity+"%");
    }
    else{
        document.write("<br>You are not eligible for exam "+eligiblity+"%");
    }
</script>

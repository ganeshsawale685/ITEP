<!-- 14. WAP to find lowest number among four different number  -->

<script>
    var a = prompt("Enter first number") * 1;
    var b = prompt("Enter second number") * 1;
    var c = prompt("Enter third number") * 1;
    var d = prompt("Enter fourth number") * 1;

    var lowest = a;

    if (b < lowest) {
        lowest = b;
    }
    if (c < lowest) {
        lowest = c;
    }
    if (d < lowest) {
        lowest = d;
    }

    document.write("The lowest number is: " + lowest);
</script>

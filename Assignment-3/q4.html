<!-- 4.A school has following rules for grading system:
a. Below 25 - F
b. 25 to 45 - E
c. 45 to 50 - D
d. 50 to 60 - C
e. 60 to 80 - B
f. Above 80 - A
Ask user to enter marks and print the corresponding grade. -->

<script>
    var marks = prompt("Enter your marks")*1;

    if(marks > 80) document.write("Grade A")
    else if(marks>60 && marks<=80) document.write("Grade B")
    else if(marks>50 && marks<=60) document.write("Grade C")
    else if(marks>45 && marks<=50) document.write("Grade D")
    else if(marks>25 && marks<=45) document.write("Grade E")
    else document.write("Fail")
</script>

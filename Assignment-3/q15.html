<!-- 15. Write a java program to accept the cost price of a bike
    and display the road tax to be paid according to the 
    following criteria.
    Cost Price(In Rs)		Tax
     > 100000			 15%
     >50000 and <=100000	 10%
     <=50000			 5%			  
 -->


<script>
    var costPrice = prompt("Enter the cost price of the bike") * 1;
    var tax;

    if (costPrice > 100000) {
        tax = costPrice * 15 / 100;
        
    }
    else if (costPrice > 50000 && costPrice <= 100000) {
        tax = costPrice * 10 / 100;
    
    }
    else if (costPrice <= 50000) {
        tax = costPrice * 5 / 100;
        
    }
    else {
        document.write("Invalid amount");
    }

    document.write("Road Tax to be paid Rs " + tax);
</script>

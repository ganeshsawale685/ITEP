<!-- 20. W.A.P to check whether a charachter is an alphabet or not. -->

<script>
    var ch = prompt("Enter a character");

    if ((ch >= 'A' && ch <= 'Z') || (ch >= 'a' && ch <= 'z')) {
        document.write(ch + " is an Alphabet");
    } else {
        document.write(ch + " is not an Alphabet");
    }
</script>

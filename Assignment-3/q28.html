<!-- 13. Program to perform arithmetic operation using switch case -->

<script>
    var num1 = prompt("Enter first number") * 1;
    var num2 = prompt("Enter second number") * 1;
    var choice = prompt(
        "Choose operation:\n1. Addition\n2. Subtraction\n3. Multiplication\n4. Division"
    ) * 1;

    switch (choice) {
        case 1:
            document.write("Addition = " + (num1 + num2));
            break;

        case 2:
            document.write("Subtraction = " + (num1 - num2));
            break;

        case 3:
            document.write("Multiplication = " + (num1 * num2));
            break;

        case 4:
            if (num2 !== 0) {
                document.write("Division = " + (num1 / num2));
            } else {
                document.write("Division by zero is not allowed");
            }
            break;

        default:
            document.write("Invalid choice");
    }
</script>

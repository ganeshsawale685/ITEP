<!-- 15. WAP to check given year is a leap year or not  -->

<script>
    var year = prompt("Enter a year") * 1;

    if ((year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0)) {
        document.write(year + " is a Leap Year");
    } else {
        document.write(year + " is not a Leap Year");
    }
</script>

<!-- 13. Write a Java program that keeps a number from the user and generates an integer between 1 and 7 and displays the name of the weekday.
Test Data
Input number: 3
Expected Output :
Wednesday -->

<script>
    var num = prompt("Enter a number between 1 and 7 ")*1;

    switch (num) {
        case 1:
            document.write("Monday")
            break;
        case 2:
            document.write("Tuesday")
            break;
        case 3:
            document.write("Wednesday")
            break;
        case 4:
            document.write("Thursday")
            break;
        case 5:
            document.write("Friday")
            break;
        case 6:
            document.write("Saturday")
            break;
        case 7:
            document.write("Sunday")
            break;
        default:
            document.write("Incorrect Number")
            break;
    }

</script>

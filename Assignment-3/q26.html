<!-- 
11. Find even odd using switch case  -->
<script>
    var num = prompt("Enter a number") * 1;

    switch (num % 2) {
        case 0:
            document.write(num + " is an Even number");
            break;
        case 1:
        case -1:   // for negative odd numbers
            document.write(num + " is an Odd number");
            break;
        default:
            document.write("Invalid input");
    }
</script>

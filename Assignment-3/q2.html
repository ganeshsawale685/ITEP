<!-- 2.A shop will give discount of 10% if the cost of purchased quantity is more than 1000.
Ask user for quantity
Suppose, one unit will cost 100.
Judge and print total cost for user.  -->

<script>
    var quantity = prompt("Enter the quantity")*1;
    var cost = quantity *100;

    if(cost > 1000) {
        cost -=  (cost*10)/100;
        document.write("Total cost after 10% discount = "+cost);
    }else{
         document.write("Total cost = "+cost);
    }
</script>

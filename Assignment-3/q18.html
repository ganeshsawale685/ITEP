<!--  WAP to calculate the percentage of students
-->

<script>
    var sub1 = prompt("Enter marks of Subject 1") * 1;
    var sub2 = prompt("Enter marks of Subject 2") * 1;
    var sub3 = prompt("Enter marks of Subject 3") * 1;
    var sub4 = prompt("Enter marks of Subject 4") * 1;
    var sub5 = prompt("Enter marks of Subject 5") * 1;

    var total = sub1 + sub2 + sub3 + sub4 + sub5;
    var percentage;

    percentage = (total / 500) * 100;

    document.write("Total Marks = " + total);
    document.write("<br>Percentage = " + percentage + "%");
</script>

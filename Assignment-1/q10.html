<!-- Find the area of an isosceles right angled triangle of equal sides 15 cm each. -->
<!-- An isosceles right-angled triangle has two equal sides that form the right angle, acting as the base and height of the triangle. The given equal side length is15cm)
    Area Formula = 1/2 x base x height 
-->

 <script>
    var side = 15;

    var area = (1/2) * side * side;

    document.write("Isosceles right-angled triangle = "+area);

 </script>

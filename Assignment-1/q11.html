<!-- The base and height of a triangle are in the ratio 8 : 5 and its area is 320 m². Find the height and base of the triangle -->
<script>
var area = 320;
var x = Math.sqrt((2 * area) / (8 * 5));
// area = 1/2bh then there is ratio we can right it 8x and 5x we used root 2 x area / 8 x 5;
var base = 8 * x;
var height = 5 * x;

document.write("Base = " + base + " m<br>");
document.write("Height = " + height + " m");
</script>

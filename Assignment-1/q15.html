<!-- Shelly has a rectangular garden of length 22 m and breath 15 m. Her friend Rachel has a square garden of side 21 m. Whose garden is bigger and by how much? -->

<script>
var shelly = 22 * 15;
var rachel = 21 * 21;

var diff =shelly - rachel;

if(shelly > rachel){
    document.write("Bigger garder is Shelly <br>" );
}
else{
    document.write("Bigger garder is Rachel <br>" );
}

document.write("Difference = " + diff);
</script>

<!--8.	Find the base of a triangle whose altitude is 20 cm and area is 0.8 m².  -->
<!-- 
        altitude is converted from centimeters to meters. 
        altitude is 20 cm to 0.2m
    -->

<script>
    var altitude = 0.2;
    var area = 0.8;
    // area = hb/2  then  b = 2*area /h
    var base = (2 *area )/altitude ;

    document.write("Base of triangle = "+base);
</script>

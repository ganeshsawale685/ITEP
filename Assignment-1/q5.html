<!-- If it costs 1600 rs. to fence a rectangular park of length 20 m at the rate of 25 rs. per m², find the breadth of the park and its perimeter. Also, find the area of the field. -->
 <script>
    var totalCost = 1600;
    var permeterSquareCost = 25;
    var length = 20;
    var perimeter =totalCost/permeterSquareCost;

    var breadth = (perimeter/2)-length;

    document.write("Breadth = "+breadth+"<br>");
    document.write("Area ="+length*breadth);

 </script>

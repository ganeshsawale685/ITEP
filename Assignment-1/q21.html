<!-- A brick measures 15 cm in length, 8 cm in breadth and 5 cm in height. How many bricks will be used to make a wall of length 15 m, breadth 10 m and height 8 metres? -->

<script>
    // First Calculate the volume of brick 
    var brickVolume = 15 * 8 * 5;
var wallVolume = 1500 * 1000 * 800;

var bricks = wallVolume / brickVolume;

document.write("Number of bricks = " + bricks);
</script>

<!-- 9. WAP to delete element from array at specific position. -->

<script>

    let arr = [1,2,3,4,5];
    let pos = prompt("Enter the position/index to delete a element")*1;
   

    document.write(arr +"<br>");
    arr.splice(pos,1);
    document.write("The new array after delete <br>"+arr);
</script>

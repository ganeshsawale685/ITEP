<!--  WAP to program calaculate the sum of all even element and all odd element of array -->

<script>
      let arr =[1,2,3,4,5];
      let odd = 0;
      let even = 0;
      for(let i of arr){
        if(i%2){
            
            odd+=i

        }else{
            even+=i
        }
      }

      document.write("Sum of Even Number "+even)
      document.write("<br>Sum of Odd Number "+odd)
</script>

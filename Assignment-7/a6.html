<!-- 6. WAP to sort the array  -->

<script>
    let arr = [21,12,3,6,2,17];
    //Selection Sort
    for(let i = 0;i<arr.length-1;i++){
        for(let j = 0;j<arr.length-i-1;j++){
            if(arr[j] > arr[j+1]){
                let temp = arr[j];
                arr[j] = arr[j+1];
                arr[j+1]= temp
            }
        }
    }
    document.write(arr);
</script>

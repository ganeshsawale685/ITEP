<!-- 8. WAP to insert a element in array at specific position. -->
<script>

    let arr = [1,2,3,4,5];
    let pos = prompt("Enter the position/index to insert a element")*1;
    let newElem = prompt("Enter the new element")*1

    document.write(arr +"<br>");
    arr.splice(pos,0,newElem);
    document.write("The new array <br>"+arr);
</script>

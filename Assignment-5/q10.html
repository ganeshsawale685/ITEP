<!-- Write a program to display traffic signal actions using switch. -->

<script>
    let signal = prompt("Enter a number to know the signal(1-3)")*1;

    switch(signal){
        case 1:document.write("Signal : Red") ; break;
        case 2:document.write("Signal : Yellow") ; break;
        case 3:document.write("Signal : Green") ; break;

        default : document.write("Incorrect Value")
    }
</script>

<!-- Write a program to check whether a given character is a vowel or consonant using switch. -->

<script>
    let char = prompt("Enter a character");

    switch(char){
        case 'a' :
        case 'e' :
        case 'i' :
        case 'o' :
        case 'u' :
        case 'A' :
        case 'E' :
        case 'I' :
        case 'O' :
        case 'U' : document.write("The character is vowel") ; break;
        default: document.write("This charcter is consonant");      
    }
</script>

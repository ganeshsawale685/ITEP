<!-- Write a program to print season name based on month using switch. -->

<script>
    let month = prompt("Enter the Month(1-12)")*1;
    switch(month){
        case 3 :
        case 4 :
        case 5 : document.write("Summer Season"); break;

        case 6:
        case 7:
        case 8:    
        case 9: document.write("Monsoom Season"); break;

        
        case 10:
        case 11:document.write("Autumn Season"); break;

        case 12:
        case 1:
        case 2:document.write("Winter Season"); break;

        default : document.write("Invalid Number")
    }
</script>

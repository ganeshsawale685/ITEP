<!-- Write a program to convert number to word (1–5) using switch. -->

<script>
    let num = prompt("Enter a number (1-5)")*1;

    switch(num){
        case 1 : document.write("One"); break;
        case 2 : document.write("Two"); break;
        case 3 : document.write("Third"); break;
        case 4 : document.write("Fourth"); break;
        case 5 : document.write("Fifth"); break;

        default :document.write("Wrong number entered");

    }
</script>

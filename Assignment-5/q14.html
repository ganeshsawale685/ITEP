<!-- Write a program for restaurant order system using switch. -->

<script>
    let order = prompt("Enter your order number(1-5)") * 1;
    switch (order) {
        case 1: document.write("You ordered Pizza - ₹200"); break;

        case 2: document.write("You ordered Burger - ₹120"); break;

        case 3: document.write("You ordered Pasta - ₹150"); break;

        case 4: document.write("You ordered Sandwich - ₹100"); break;

        case 5: document.write("You ordered Coffee - ₹80"); break;

        default: document.write("Order number is not valid")
    }
</script>

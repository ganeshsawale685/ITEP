<!-- Write a program to print weekend or weekday using switch. -->

<script>
    let day = prompt("Enter a day (Monday to Sunday)");

    switch(day){
        case "Monday" : document.write("Weekday") ; break;
        case "Tuesday" : document.write("Weekday") ; break;
        case "Wednesday" : document.write("Weekday") ; break;
        case "Thursday" : document.write("Weekday") ; break;
        case "Friday" : document.write("Weekday") ; break;
        case "Saturday" : document.write("Weekend") ; break;
        case "Sunday" : document.write("Weekend") ; break;
        default : document.write("Invalid Day");
    }

</script>

<!-- Write a program for ATM menu options using switch. -->

<script>
    let atmMenu = prompt("Enter a Number  \n 1 for Withdraw \n 2 for Deposite \n 3 for Transfer-Money \n 4 for  Mini-Statement") *1

    switch(atmMenu){
        case 1 : document.write("Withdraw Amount") ; break;
        case 2 : document.write("Deposite Amount") ; break;
        case 3 : document.write("Transfer Amount") ; break;
        case 4 : document.write("Statement of Amount") ; break;
        default : document.write("Select the correct option");
    }
</script>

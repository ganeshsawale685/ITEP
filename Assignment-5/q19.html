<!-- Write a program to implement role-based access using switch. -->
<script>
    let role = prompt("Enter your role (manager / developer / hr)");

    switch (role) {
        case "manager":
            document.write("Access to Manager");
            break;

        case "developer":
            document.write("Access to Developer");
            break;

        case "hr":
            document.write("Access to HR");
            break;

        default:
            document.write("No Role ");
    }
</script>

<!-- Write a program to print the number of days in a month using switch. -->

<script>
    let month = prompt("Enter a number (1-12) for month ")*1;

    switch(month){
        case 1 : document.write("January : 31 Days") ; break;
        case 2 : document.write("Feburary : 28 or 29 Days") ; break;
        case 3 : document.write("March : 31 Days") ; break;
        case 4 : document.write("April : 30 Days") ; break;
        case 5 : document.write("May : 31 Days") ; break;
        case 6 : document.write("June : 30 Days") ; break;
        case 7 : document.write("July : 31 Days") ; break;
        case 8 : document.write("August :31 Days") ; break;
        case 9 : document.write("September : 30 Days") ; break;
        case 10 : document.write("October : 31 Days") ; break;
        case 11 : document.write("November: 30 Days ") ; break;
        case 12 : document.write("December : 31 Days") ; break;

        default : document.write("Invalid number")

    }
</script>

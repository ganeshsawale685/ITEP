<!-- Write a program for language selection menu using switch. -->

<script>
    let lang = prompt("Enter Number \n 1 For English \n 2 For Hindi \n 3 For Marathi \n 4 for Tamil")*1;

    switch(lang){
        case 1 : document.write("Choose English"); break;
        case 2 : document.write("Choose Hindi"); break;
        case 3 : document.write("Choose Marathi"); break;
        case 4 : document.write("Choose Tamil"); break;

        default : document.write("Choose right option")
    }
</script>

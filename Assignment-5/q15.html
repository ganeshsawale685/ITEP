<!-- Write a program to display shipping cost based on delivery option using switch. -->

<script>
    let delivery = prompt("Choose type of Delivery \n 1 Standard Delivery \n 2 Exprerss Delivery \n 3 In-House Delivery")*1

    switch(delivery){
        case 1: document.write("Standard Delivery : Rs 1000") ; break;
        case 2: document.write("Express Delivery : Rs 800") ; break;
        case 3: document.write("In-House Delivery : Rs 500") ; break;
        default: document.write("Invalid Option Select")
    }
</script>

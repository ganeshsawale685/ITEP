<!-- Write a program to create a login system menu using switch. -->

<script>
    let choice = prompt(
        "Login Menu:\n 1. Admin Login\n 2. User Login\n 3. Guest Login\n" ) * 1;

    switch (choice) {
        case 1:document.write("Admin Login Successful"); break;

        case 2:document.write("User Login Successful");break;

        case 3:document.write("Guest Login Successful"); break;

        default:document.write("Invalid choice");
    }
</script>

<!-- Write a program to implement a menu-driven program using switch. -->

<script>
    let menu = prompt("Enter a number would you like in a menu (1-5)")*1;
    switch(menu){
        case 1 : document.write("First Menu Item ")   ; break;
        case 2 : document.write("Second Menu Item ") ; break;
        case 3 : document.write("Third Menu Item ") ; break;
        case 4 : document.write("Fourth Menu Item ") ; break;
        case 5 : document.write("Fifth Menu Item ") ; break;

        default : document.write("Not in a Menu")
    }
</script>
